name: YouTube Downloader Final V6.8

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'קישור לסרטון, פלייליסט או ערוץ'
        required: true
      quality_profile:
        description: 'פרופיל איכות'
        required: true
        default: 'fast_video'
      file_name:
        description: 'שם קובץ (אופציונלי)'
        required: false
        default: '%(title)s'
      dynamic_cookies:
        description: 'עוגיות מהתוסף'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools (FFmpeg & Deno)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg zip
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          else
            touch cookies.txt
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Run Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          
          # יצירת תיקיית עבודה נקייה
          mkdir -p output_folder

          # חילוץ השם לפי סדר העדיפויות החדש: פלייליסט -> ערוץ -> מעלה -> כותרת
          # השתמשתי בפורמט שמבטיח עדיפות לפלייליסט
          RAW_NAME=$(yt-dlp --cookies cookies.txt --user-agent "$UA" --print "%(playlist_title,channel,uploader,title)s" --playlist-items 1 "${{ github.event.inputs.video_url }}" | head -n 1 | tr -d '"/\\?%*:|"<>')
          
          # אם השם עדיין ריק
          if [ -z "$RAW_NAME" ] || [ "$RAW_NAME" == "NA" ]; then 
            RAW_NAME="yt_download_$(date +%Y%m%d_%H%M%S)"; 
          fi
          
          echo "FINAL_NAME=$RAW_NAME" >> $GITHUB_ENV
          echo "שם שזוהה למשימה (עדיפות לפלייליסט): $RAW_NAME"

          OUT_TEMPLATE="output_folder/${{ github.event.inputs.file_name }}.%(ext)s"
          
          # ביצוע ההורדה
          case "${{ github.event.inputs.quality_profile }}" in
            "high_video")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo+bestaudio/best" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "mp4_1080")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "fast_video")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "worstvideo+worstaudio/worst" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "high_mp3")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 0 "${{ github.event.inputs.video_url }}" -o "output_folder/%(title)s.mp3"
              ;;
            "fast_mp3")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 9 "${{ github.event.inputs.video_url }}" -o "output_folder/%(title)s.mp3"
              ;;
            "flac_audio")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format flac "${{ github.event.inputs.video_url }}" -o "output_folder/%(title)s.flac"
              ;;
            "wav_audio")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format wav "${{ github.event.inputs.video_url }}" -o "output_folder/%(title)s.wav"
              ;;
          esac

          # כיווץ התיקייה ל-ZIP עם השם שחולץ
          zip -r "${RAW_NAME}.zip" output_folder/ -j
          
      - name: Verify and Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_NAME }}
          path: "*.zip"
          if-no-files-found: warn
          retention-days: 1
