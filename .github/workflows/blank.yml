name: YouTube Downloader Final V4

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL'
        required: true
      quality_profile:
        description: 'Quality'
        required: true
      file_name:
        description: 'Custom File Name'
        required: false
        default: 'download'
      dynamic_cookies:
        description: 'Cookies Base64'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg zip
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Run Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          NAME="${{ github.event.inputs.file_name }}"
          
          # הורדה עם תמיכה בפלייליסט (יוצר קבצים ממוספרים אם זה פלייליסט)
          case "${{ github.event.inputs.quality_profile }}" in
            "high_video") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo+bestaudio/best" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$NAME.%(ext)s" ;;
            "mp4_standard") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "$NAME.%(ext)s" ;;
            "high_mp3") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 0 "${{ github.event.inputs.video_url }}" -o "$NAME.%(ext)s" ;;
          esac

          # אם נוצרו כמה קבצים (פלייליסט), נארוז ל-ZIP
          if [ $(ls $NAME.* 2>/dev/null | wc -l) -gt 1 ]; then
            zip -r "$NAME-all.zip" . -i "$NAME.*"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: "./*"
          if-no-files-found: warn
