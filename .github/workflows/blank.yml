name: YouTube Downloader Final V7.1

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'קישור לסרטון, פלייליסט או ערוץ'
        required: true
      quality_profile:
        description: 'פרופיל איכות'
        required: true
        default: 'fast_video'
      file_name:
        description: 'שם קובץ (אופציונלי)'
        required: false
        default: '%(title)s'
      dynamic_cookies:
        description: 'עוגיות מהתוסף'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools (FFmpeg & Deno)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg zip
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          else
            touch cookies.txt
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Run Download and Save Artifact Name
        id: dl_step
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          
          mkdir -p output_folder

          # חילוץ שם יסודי (פלייליסט -> ערוץ -> מעלה -> כותרת)
          # הוספתי הגנה מפני תווים שבורים בעברית
          RAW_NAME=$(yt-dlp --cookies cookies.txt --user-agent "$UA" --quiet --playlist-items 1 --print "%(playlist_title,channel,uploader,title)s" "${{ github.event.inputs.video_url }}" | head -n 1)
          
          # ניקוי תווים לא חוקיים למערכת קבצים
          CLEAN_NAME=$(echo "$RAW_NAME" | tr -d '"/\\?%*:|"<>')
          
          # אם השם ריק או NA, ניתן שם גנרי
          if [ -z "$CLEAN_NAME" ] || [ "$CLEAN_NAME" == "NA" ]; then
             CLEAN_NAME="yt_download_$(date +%Y%m%d_%H%M%S)"
          fi

          # כתיבת השם לקובץ הסביבה של גיטהאב (חשוב מאוד להעלאה!)
          echo "FINAL_NAME=$CLEAN_NAME" >> $GITHUB_ENV
          echo "ZIP_NAME=$CLEAN_NAME" >> $GITHUB_ENV
          
          echo "Target Artifact Name: $CLEAN_NAME"

          # ביצוע ההורדה
          case "${{ github.event.inputs.quality_profile }}" in
            "high_video")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo+bestaudio/best" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "output_folder/${{ github.event.inputs.file_name }}.%(ext)s"
              ;;
            "mp4_1080")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "output_folder/${{ github.event.inputs.file_name }}.%(ext)s"
              ;;
            "fast_video")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "worstvideo+worstaudio/worst" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "output_folder/${{ github.event.inputs.file_name }}.%(ext)s"
              ;;
            "high_mp3")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 0 "${{ github.event.inputs.video_url }}" -o "output_folder/%(title)s.mp3"
              ;;
            "fast_mp3")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 9 "${{ github.event.inputs.video_url }}" -o "output_folder/%(title)s.mp3"
              ;;
          esac

          # יצירת הזיפ
          zip -r "${CLEAN_NAME}.zip" output_folder/ -j

      - name: Verify and Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # כאן אנחנו משתמשים במשתנה שהזרקנו ל-ENV בשלב הקודם
          name: ${{ env.FINAL_NAME }}
          path: "*.zip"
          if-no-files-found: warn
          retention-days: 1
