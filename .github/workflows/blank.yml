name: YouTube Downloader Fixed

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'הכנס לינק מיוטיוב'
        required: true
      file_format:
        description: 'בחר פורמט'
        required: true
        default: 'mp4'
        type: choice
        options:
          - mp4
          - mp3

jobs:
  download_job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install latest yt-dlp
        run: |
          python3 -m pip install -U pip
          python3 -m pip install -U yt-dlp

      - name: Run Download
        run: |
          # שימוש בפרמטרים לשיפור התאימות ועקיפת חסימות
          if [ "${{ github.event.inputs.file_format }}" = "mp3" ]; then
            yt-dlp --no-check-certificates --no-cache-dir --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36" -x --audio-format mp3 "${{ github.event.inputs.video_url }}" -o "video.%(ext)s"
          else
            yt-dlp --no-check-certificates --no-cache-dir --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/119.0.0.0 Safari/537.36" -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "video.%(ext)s"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: my-video
          path: video.*
          retention-days: 1
