name: YouTube Downloader V8.5 (Bypass YouTube N-Challenge)

on:
  workflow_dispatch:
    inputs:
      video_url: { required: true }
      quality_profile: { required: true, default: 'fast_video' }
      file_name: { required: false, default: '%(title)s' }
      dynamic_cookies: { required: false }
      yt_api_key: { required: false }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg zip jq
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          else
            touch cookies.txt
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Extract Name via YouTube API
        id: api_name
        run: |
          URL="${{ github.event.inputs.video_url }}"
          API_KEY="${{ github.event.inputs.yt_api_key }}"
          FINAL_NAME="yt_download_$(date +%m%d_%H%M)"

          if [ -n "$API_KEY" ]; then
            if [[ "$URL" == *"list="* ]]; then
              ID=$(echo "$URL" | grep -oP 'list=\K[^&]+')
              RAW_NAME=$(curl -s "https://www.googleapis.com/youtube/v3/playlists?part=snippet&id=$ID&key=$API_KEY" | jq -r '.items[0].snippet.title // empty')
            elif [[ "$URL" == *"v="* ]]; then
              ID=$(echo "$URL" | grep -oP 'v=\K[^&]+')
              RAW_NAME=$(curl -s "https://www.googleapis.com/youtube/v3/videos?part=snippet&id=$ID&key=$API_KEY" | jq -r '.items[0].snippet.title // empty')
            elif [[ "$URL" == *"@"* ]]; then
              HANDLE=$(echo "$URL" | grep -oP '@\K[^/?]+')
              RAW_NAME=$(curl -s "https://www.googleapis.com/youtube/v3/channels?part=snippet&forHandle=$HANDLE&key=$API_KEY" | jq -r '.items[0].snippet.title // empty')
            fi
            
            if [ -n "$RAW_NAME" ] && [ "$RAW_NAME" != "null" ]; then
              FINAL_NAME=$(echo "$RAW_NAME" | tr -d '"/\\?%*:|"<>')
            fi
          fi
          echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV

      - name: Run Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          mkdir -p output_folder
          
          # הגדרות משותפות הכוללות מעקף לחסימת יוטיוב (n-challenge)
          # הוספנו את --remote-components ejs:github
          COMMON_OPTS=(
            --cookies "cookies.txt"
            --user-agent "$UA"
            --remote-components "ejs:github"
            --merge-output-format "mp4"
            --recode-video "mp4"
            --postprocessor-args "ffmpeg:-c:a aac"
          )

          URL="${{ github.event.inputs.video_url }}"
          OUT_PATH="output_folder/${{ github.event.inputs.file_name }}.%(ext)s"

          case "${{ github.event.inputs.quality_profile }}" in
            "fast_video") yt-dlp "${COMMON_OPTS[@]}" -f "worstvideo+worstaudio/worst" "$URL" -o "$OUT_PATH" ;;
            "mp4_720")    yt-dlp "${COMMON_OPTS[@]}" -f "bestvideo[height<=720]+bestaudio/best" "$URL" -o "$OUT_PATH" ;;
            "mp4_1080")   yt-dlp "${COMMON_OPTS[@]}" -f "bestvideo[height<=1080]+bestaudio/best" "$URL" -o "$OUT_PATH" ;;
            "high_2k")    yt-dlp "${COMMON_OPTS[@]}" -f "bestvideo[height<=1440]+bestaudio/best" "$URL" -o "$OUT_PATH" ;;
            "high_4k")    yt-dlp "${COMMON_OPTS[@]}" -f "bestvideo[height<=2160]+bestaudio/best" "$URL" -o "$OUT_PATH" ;;
            "high_mp3")   yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components "ejs:github" -x --audio-format mp3 --audio-quality 0 "$URL" -o "output_folder/%(title)s.mp3" ;;
            "fast_mp3")   yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components "ejs:github" -x --audio-format mp3 --audio-quality 9 "$URL" -o "output_folder/%(title)s.mp3" ;;
            "flac_audio") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components "ejs:github" -x --audio-format flac "$URL" -o "output_folder/%(title)s.flac" ;;
            "wav_audio")  yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components "ejs:github" -x --audio-format wav "$URL" -o "output_folder/%(title)s.wav" ;;
          esac

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.FINAL_NAME }}
          path: output_folder/
          retention-days: 1
