name: YouTube Downloader Final V5.0

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'URL'
        required: true
      quality_profile:
        description: 'Profile'
        required: true
        default: 'fast_video'
      file_name:
        description: 'Name'
        required: false
        default: '%(title)s'
      dynamic_cookies:
        description: 'Cookies'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg zip
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Run Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          OUT_TEMPLATE="${{ github.event.inputs.file_name }}.%(ext)s"
          
          case "${{ github.event.inputs.quality_profile }}" in
            "high_video") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo+bestaudio/best" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE" ;;
            "mp4_standard") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE" ;;
            "fast_video") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "worstvideo+worstaudio/worst" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE" ;;
            "high_mp3") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 0 "${{ github.event.inputs.video_url }}" -o "%(title)s.mp3" ;;
            "webm_format") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo[ext=webm]+bestaudio[ext=webm]/best" "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE" ;;
            "mkv_format") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo+bestaudio/best" --merge-output-format mkv "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE" ;;
          esac

          if [ $(ls | grep -E '\.(mp4|mp3|mkv|webm)$' | wc -l) -gt 1 ]; then
            zip -r "playlist_download.zip" . -i "*.mp4" "*.mp3" "*.mkv" "*.webm"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: |
            *.mp4
            *.mp3
            *.mkv
            *.webm
            playlist_download.zip
          if-no-files-found: warn
