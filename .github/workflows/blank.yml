name: YouTube Downloader with Cookies

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'לינק לסרטון'
        required: true
      file_format:
        description: 'פורמט (mp4/mp3)'
        required: true
        default: 'mp4'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Run Download
        run: |
          # וידוא שהקובץ קיים לפני ההרצה
          if [ ! -f "cookies.txt" ]; then
            echo "Error: cookies.txt not found!"
            exit 1
          fi
          
          echo "Starting download with cookies..."
          
          if [ "${{ github.event.inputs.file_format }}" = "mp3" ]; then
            yt-dlp --cookies cookies.txt -x --audio-format mp3 "${{ github.event.inputs.video_url }}" -o "output.%(ext)s"
          else
            yt-dlp --cookies cookies.txt -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "output.%(ext)s"
          fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: youtube-file
          path: output.*
