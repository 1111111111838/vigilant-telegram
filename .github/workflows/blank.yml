name: YouTube & Telegram Downloader V8.2 (Full Link Fix)

on:
  workflow_dispatch:
    inputs:
      video_url: { required: true }
      quality_profile: { required: true, default: 'fast_video' }
      file_name: { required: false, default: '%(title)s' }
      dynamic_cookies: { required: false }
      yt_api_key: { required: false }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg zip jq
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          else
            touch cookies.txt
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Run Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          mkdir -p output_folder
          
          # ניקוי הקישור - המרת קישורי תצוגה מקדימה לקישורים ישירים
          URL="${{ github.event.inputs.video_url }}"
          CLEAN_URL=$(echo "$URL" | sed 's|t.me/s/|t.me/|g')
          
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          
          ARGS=(
            --cookies "cookies.txt"
            --user-agent "$UA"
            --no-check-certificate
            --allow-dynamic-mpd
            --referer "https://t.me/"
            --format-sort "res,ext:mp4:m4a"
            --merge-output-format "mp4"
          )
          
          FILENAME_PATTERN="output_folder/${{ github.event.inputs.file_name }}.%(ext)s"

          case "${{ github.event.inputs.quality_profile }}" in
            "fast_video") yt-dlp "${ARGS[@]}" -f "worst" --postprocessor-args "ffmpeg:-c:a aac" "$CLEAN_URL" -o "$FILENAME_PATTERN" ;;
            "mp4_720")    yt-dlp "${ARGS[@]}" -f "bestvideo[height<=720]+bestaudio/best" --postprocessor-args "ffmpeg:-c:a aac" "$CLEAN_URL" -o "$FILENAME_PATTERN" ;;
            "mp4_1080")   yt-dlp "${ARGS[@]}" -f "bestvideo[height<=1080]+bestaudio/best" --postprocessor-args "ffmpeg:-c:a aac" "$CLEAN_URL" -o "$FILENAME_PATTERN" ;;
            "high_2k")    yt-dlp "${ARGS[@]}" -f "bestvideo[height<=1440]+bestaudio/best" --postprocessor-args "ffmpeg:-c:a aac" "$CLEAN_URL" -o "$FILENAME_PATTERN" ;;
            "high_4k")    yt-dlp "${ARGS[@]}" -f "bestvideo[height<=2160]+bestaudio/best" --postprocessor-args "ffmpeg:-c:a aac" "$CLEAN_URL" -o "$FILENAME_PATTERN" ;;
            "high_mp3")   yt-dlp --cookies "cookies.txt" --user-agent "$UA" -x --audio-format mp3 --audio-quality 0 "$CLEAN_URL" -o "output_folder/%(title)s.mp3" ;;
            "fast_mp3")   yt-dlp --cookies "cookies.txt" --user-agent "$UA" -x --audio-format mp3 --audio-quality 9 "$CLEAN_URL" -o "output_folder/%(title)s.mp3" ;;
            "flac_audio") yt-dlp --cookies "cookies.txt" --user-agent "$UA" -x --audio-format flac "$CLEAN_URL" -o "output_folder/%(title)s.flac" ;;
            "wav_audio")  yt-dlp --cookies "cookies.txt" --user-agent "$UA" -x --audio-format wav "$CLEAN_URL" -o "output_folder/%(title)s.wav" ;;
          esac

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: download_result
          path: output_folder/
          retention-days: 1
