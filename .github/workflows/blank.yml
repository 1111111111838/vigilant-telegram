name: YouTube Downloader Final V4.1

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'קישור לסרטון או פלייליסט'
        required: true
      quality_profile:
        description: 'פרופיל איכות'
        required: true
        default: 'mp4_standard'
      file_name:
        description: 'שם קובץ (אופציונלי - אם ריק ישתמש בכותרת מיוטיוב)'
        required: false
        default: '%(title)s'
      dynamic_cookies:
        description: 'עוגיות מהתוסף (Base64)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg zip
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
            echo "Using dynamic cookies from extension."
          elif [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "Using static cookies from Secrets."
          else
            echo "No cookies provided, using empty file."
            touch cookies.txt
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Run Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          
          # שימוש בשם שנשלח מהתוסף (דינמי) או בכותרת הסרטון
          OUT_TEMPLATE="${{ github.event.inputs.file_name }}.%(ext)s"
          
          echo "Starting download for: ${{ github.event.inputs.video_url }}"
          
          case "${{ github.event.inputs.quality_profile }}" in
            "high_video")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo+bestaudio/best" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "mp4_standard")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "fast_video")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "worstvideo+worstaudio/worst" "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "high_mp3")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 0 "${{ github.event.inputs.video_url }}" -o "%(title)s.mp3"
              ;;
            "fast_mp3")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 9 "${{ github.event.inputs.video_url }}" -o "%(title)s.mp3"
              ;;
          esac

          # טיפול בפלייליסט: אם נוצרו יותר מקובץ מדיה אחד, נארוז את כולם ל-ZIP
          FILE_COUNT=$(ls | grep -E '\.(mp4|mp3|mkv|webm)$' | wc -l)
          if [ "$FILE_COUNT" -gt 1 ]; then
            echo "Multiple files detected, creating ZIP archive..."
            zip -r "playlist_download.zip" . -i "*.mp4" "*.mp3" "*.mkv" "*.webm"
          fi

      - name: Verify and Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: |
            *.mp4
            *.mp3
            playlist_download.zip
          if-no-files-found: warn
          retention-days: 1
