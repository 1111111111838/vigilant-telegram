name: YouTube Downloader Final V6.3

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'קישור לסרטון או פלייליסט'
        required: true
      quality_profile:
        description: 'פרופיל איכות'
        required: true
        default: 'fast_video'
      file_name:
        description: 'שם קובץ (אופציונלי)'
        required: false
        default: '%(title)s'
      dynamic_cookies:
        description: 'עוגיות מהתוסף'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Tools (FFmpeg & Deno)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg zip
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          else
            touch cookies.txt
          fi

      - name: Install yt-dlp
        run: python3 -m pip install -U yt-dlp

      - name: Run Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          
          # חילוץ שם האוסף לטובת שם הזיפ
          COLLECTION_NAME=$(yt-dlp --get-filename -o "%(playlist_title|channel|title)s" --cookies cookies.txt --user-agent "$UA" "${{ github.event.inputs.video_url }}" | head -n 1 | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "ZIP_NAME=$COLLECTION_NAME" >> $GITHUB_ENV
          
          OUT_TEMPLATE="${{ github.event.inputs.file_name }}.%(ext)s"
          
          # תיקון המבנה של ה-case
          case "${{ github.event.inputs.quality_profile }}" in
            "high_video")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo+bestaudio/best" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "mp4_1080")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo[ext=mp4][height<=1080]+bestaudio[ext=m4a]/best[ext=mp4]/best" "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "fast_video")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "worstvideo+worstaudio/worst" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT_TEMPLATE"
              ;;
            "high_mp3")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 0 "${{ github.event.inputs.video_url }}" -o "%(title)s.mp3"
              ;;
            "fast_mp3")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 9 "${{ github.event.inputs.video_url }}" -o "%(title)s.mp3"
              ;;
            "flac_audio")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format flac "${{ github.event.inputs.video_url }}" -o "%(title)s.flac"
              ;;
            "wav_audio")
              yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format wav "${{ github.event.inputs.video_url }}" -o "%(title)s.wav"
              ;;
          esac

          # יצירת קובץ ה-ZIP
          zip -r "${COLLECTION_NAME}.zip" . -i "*.mp4" "*.mp3" "*.mkv" "*.webm" "*.flac" "*.wav"

      - name: Verify and Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: |
            *.mp4
            *.mp3
            *.mkv
            *.flac
            *.wav
            *.zip
          if-no-files-found: warn
          retention-days: 1
