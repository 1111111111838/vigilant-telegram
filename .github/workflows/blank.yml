name: YouTube Downloader V7.0 Multi-Task

on:
  workflow_dispatch:
    inputs:
      video_url: { required: true }
      quality_profile: { required: true }
      file_name: { required: false }
      task_id: { required: true } # מזהה ייחודי למשימה כדי למנוע התנגשויות
      dynamic_cookies: { required: false }

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tools
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg zip
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          fi

      - name: Run Download
        run: |
          export PATH="$HOME/.deno/bin:$PATH"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36"
          OUT="${{ github.event.inputs.file_name }}.%(ext)s"
          
          case "${{ github.event.inputs.quality_profile }}" in
            "fast_video") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "worstvideo+worstaudio/worst" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT" ;;
            "mp4_1080") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo[height<=1080]+bestaudio[ext=m4a]/best" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT" ;;
            "high_4k") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -f "bestvideo+bestaudio/best" --merge-output-format mp4 "${{ github.event.inputs.video_url }}" -o "$OUT" ;;
            "high_mp3") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format mp3 --audio-quality 0 "${{ github.event.inputs.video_url }}" -o "%(title)s.mp3" ;;
            "wav_audio") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format wav "${{ github.event.inputs.video_url }}" -o "%(title)s.wav" ;;
            "flac_audio") yt-dlp --cookies cookies.txt --user-agent "$UA" --remote-components ejs:github -x --audio-format flac "${{ github.event.inputs.video_url }}" -o "%(title)s.flac" ;;
          esac

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          # שם הארטיפקט כולל את ה-task_id כדי לאפשר הורדות מקבילות
          name: download-${{ github.event.inputs.task_id }}
          path: |
            *.mp4
            *.mp3
            *.wav
            *.flac
          retention-days: 1
